<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000C34">
    <title>Ithel TV | Catálogo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>


<header>
    <div class="btn-m" id="abrir">☰</div>
    <div class="logo-container">
        <a href="index.html">
            <img src="assets/icons/ithieltv.svg" alt="Ithiel TV" class="logo-main">
        </a>
    </div>
</header>

<section class="sec" id="catalogo">
    <div class="t-sec"><div class="linea"></div> CATÁLOGO</div>
    
    <div class="filtros">
        <button id="btn-todo" class="btn-f active" onclick="filtrar('todo')">Todo</button>
        <button class="btn-f" onclick="filtrar('predicacion')">Predicaciones</button>
        <button class="btn-f" onclick="filtrar('alabanza')">Alabanzas</button>
        <button class="btn-f" onclick="filtrar('estudio')">Estudios Bíblicos</button>
    </div>

    <div id="lista-videos">
        <div class="card item predicacion">
            <div class="vid">
                <iframe src="https://www.youtube.com/embed/videoseries?list=PLN6G8LjKatYE3z5otWJQfp3gxnsb1_9Gb" allowfullscreen></iframe>
            </div>
            <div class="v-info">Serie: Nuestra Personalidad Cristiana</div>
        </div>

        <div class="card item alabanza">
            <div class="vid">
                <iframe src="https://www.youtube.com/embed/videoseries?list=PLN6G8LjKatYEV9vzxcICWud-a81nAzUEZ" allowfullscreen></iframe>
            </div>
            <div class="v-info">Alabanza: Tiempo de alabanza y Adoración</div>
        </div>
        
        <div class="card item estudio">
            <div class="vid">
                <iframe src="https://www.youtube.com/embed/VIDEO_ID_3" allowfullscreen></iframe>
            </div>
            <div class="v-info">Estudio: Introducción a los Evangelios</div>
        </div>
    </div>
</section>



<!--SCRIPTS(orden correct de carga) -->
<script src="js/carousel.js"></script>
<script src="js/filters.js"></script>
<script src="js/modal.js"></script>
<script src="js/main.js"></script>
<script src="js/include.js"></script>

</body>
</html>
