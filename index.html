<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000C34">
    <title>Ithiel TV | Inicio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body id="inicio-top">

<!-- ANIMACIÓN DE ENTRADA -->

<div id="loader" class="loader-wrapper">
    <div class="loader-container">
        
  <!--Logo: Estático en el centro -->
        <img src="assets/icons/ithieltv.svg" class="loader-logo" alt=" Ithiel TV">

        <img src="assets/icons/animacion.png" class="spinner-png" alt="Cargando">

    </div>
</div>





<!-- HEADER barra superior -->
<header>
    <div class="btn-m" id="abrir">☰</div>
    
    <div class="logo-container">
        <button onclick="irAlInicio()" class="logo-btn">
            <img src="assets/icons/ithieltv.svg" alt="Ithiel TV" class="logo-main">
        </button>
    </div>
</header>

<!-- CARRUSEL -->
<section id="inicio"class="hero">
<div class="slider" id="slider">
    <div class="slides" id="slides">
        <div class="slide slide--bienvenida">
            <h3>Bienvenidos a Ithiel Televisión</h3>
        </div>
        <div class="slide slide--esperanza">
            <h3>Mensajes de esperanza</h3>
        </div>
        <div class="slide slide--alabanzas">
            <h3>Coros y alabanzas</h3>
        </div>
        <div class="slide slide--adoracion">
            <h3>Adoración</h3>
        </div>
    </div> <div class="dots" id="dots-container">
        <div class="dot active" onclick="irASlide(0)"></div>
        <div class="dot" onclick="irASlide(1)"></div>
        <div class="dot" onclick="irASlide(2)"></div>
        <div class="dot" onclick="irASlide(3)"></div>
    </div>
</div>
</section>

<!-- SECCIÓN CULTOS -->
<section class="sec">
    <div class="t-sec"><div class="linea"></div>Cultos</div>
    <div class="grid-container">
       
    <div class="grid-card" 
    onclick="abrirImagen
    ('assets/img/imagen1.jpg', 
    'Lema Familia', 
    'Lema de este año 2026.')">
        
            <img src="assets/img/imagen1.jpg" alt="Lema Familia">
            <div class="grid-title">Lema Familia</div>
        </div>
       
        <div class="grid-card" onclick="abrirImagen('assets/img/culto2.jpg','Entrega',
        'Foto de la alabanza hermano alabe el señor')">
            
            <img src="assets/img/culto2.jpg" alt="Hermano alabe al señor">
            <div class="grid-title">Hermano alabe al señor</div>
        </div>
        
        <div class="grid-card" onclick="abrirImagen('assets/img/culto3.jpg', 'Hermano alabe al señor', 'Foto de la alabanza hermano alabe el señor')">
            <img src="assets/img/culto3.jpg" alt="Hermano alabe al señor">
            <div class="grid-title">Hermano alabe al señor</div>
        </div>
    </div>
</section>

<!-- SECCIÓN VISITAS -->
<section class="sec">
    <div class="t-sec"><div class="linea"></div>Visitas</div>
    <div class="grid-container">
       
        <div class="grid-card" onclick="abrirImagen('assets/img/Visita1.jpg', 'Mañanitas', 'Embarcándose después del culto en las mañanitas')">
            <img src="assets/img/Visita1.jpg" alt="Visita">
            <div class="grid-title">Mañanitas</div>
        </div>
       
        <div class="grid-card" onclick="abrirImagen('assets/img/Visita2.jpg', 'Mañanitas', 'Los embarcados después del culto en las mañanitas')">
            <img src="assets/img/Visita2.jpg" alt="Alabanza">
            <div class="grid-title">Mañanitas</div>
        </div>
    </div>
</section>


<!-- SECCIÓN MOMENTOS ESPECIALES -->
<section class="sec" style="margin-top: -10px;"> 
    <div class="t-sec"><div class="linea"></div>Momentos Especiales</div>
    <div class="grid-container">
       
        <div class="grid-card" onclick="abrirImagen('assets/img/momentos1.jpg', 'Cumpleaños de Noris', 'Celebración especial')">
            <img src="assets/img/momentos1.jpg" alt="Cumpleaños">
            <div class="grid-title">Cumpleaños de Noris</div>
        </div>
    </div>
</section>


<!-- MODAL -->
<div id="modalImagen" class="modal-viewer">
    <span class="close-modal" onclick="cerrarImagen()">&times;</span>
    <div class="modal-content">
        <div class="modal-wrapper">
            <img id="imgFull" src="" alt="Imagen Completa">
            <div class="modal-info-container">
                <h2 id="modalTitulo"></h2>
                <p id="modalDescripcion"></p>
                <div class="modal-actions">
                    <a id="btnDescargar" href="" download class="btn-action btn-download">
                        <i class="fas fa-download"></i> Descargar
                    </a>
                    <button id="btnCompartir" class="btn-action btn-share" onclick="compartirContenido()">
                        <i class="fas fa-share-alt"></i> Compartir
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>






<!-- SCRIPTS (orden correcto de carga) -->
<script src="js/carousel.js"></script>
<script src="js/filters.js"></script>
<script src="js/modal.js"></script>
<script src="js/main.js"></script>
<script src="js/include.js"></script>

</body>
</html>
