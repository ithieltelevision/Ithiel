<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000C34">
    <title>Ithiel TV | En Vivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>


<header>
    <div class="btn-m" id="abrir">☰</div>
    <div class="logo-container">
        <a href="index.html">
            <img src="assets/icons/ithieltv.svg" alt="Ithiel TV" class="logo-main">
        </a>
    </div>
</header>

<section class="sec" id="vivo">
    <div class="t-sec"><div class="linea"></div> TV EN VIVO</div>
    
    <div class="card" style="border: 1px solid #333;">
        <div class="vid">
            <span style="position:absolute; top:15px; left:15px; background:red; padding:4px 10px; border-radius:4px; font-size:12px; font-weight:bold; z-index:10; animation: pulse 2s infinite;">EN VIVO</span>
            <iframe src="https://www.youtube.com/embed/LIVE_ID" allowfullscreen></iframe>
        </div>
        <div class="v-info">Señal Principal Ithiel TV Digital</div>
    </div>
</section>
